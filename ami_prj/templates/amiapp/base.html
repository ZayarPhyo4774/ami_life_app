{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}AMI Life Insurance{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-light bg-light shadow-sm fixed-top py-3">

    <div class="container d-flex align-items-center justify-content-between">

      {% if show_back_button %}
        <button type="button" class="btn btn-outline-primary" onclick="window.history.back(); ">
          <i class="fas fa-arrow-left me-1"></i> Back
        </button>
      {% else %}
        <div style="width: 3.5rem;"></div>
      {% endif %}

      <a class="navbar-brand d-flex align-items-center mx-auto" href="/">
          <img src="{% static 'images/logo.png' %}"
            alt="Logo"
            class="navbar-logo">
      </a>

      <div style="width: 3.5rem;"></div>

    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="flex-grow-1" style="padding-top:150px;">

    <div class="container">
      {% block content %}{% endblock %}
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="bg-light py-4 mt-5">

    <div class="container text-center">

      <p class="mb-2">
        &copy; 2026 AMI Life / All rights reserved by AYA Myanmar Life Assurance Company Limited.
      </p>

      <div class="social">

        <a href="https://www.facebook.com/share/18T1zRaa4k/?mibextid=wwXIfr" class="mx-2 text-muted">
          <i class="fab fa-facebook fa-lg"></i>
        </a>

        {% comment %} <a href="#" class="mx-2 text-muted">
          <i class="fab fa-instagram fa-lg"></i>
        </a> {% endcomment %}

        <a href="https://www.linkedin.com/company/ayamyanmarlifeassurance/" class="mx-2 text-muted">
          <i class="fab fa-linkedin fa-lg"></i>
        </a>

        <a href="https://www.amilifeassurance.com" class="mx-2 text-muted">
          <i class="fa-solid fa-globe"></i>
        </a>

      </div>

    </div>

  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
