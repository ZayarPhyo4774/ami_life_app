{% extends 'base.html' %}

{% block title %}How to Claim{% endblock %}

<div class="d-flex justify-content-center mt-4">

    <!-- TITLE (same width as card) -->

        <h2 class="mb-0 fw-bold">How to Claim?</h2>
    </div>

    <!-- CARD -->
    <div class="card shadow-sm">

        <div class="card-body">

        <a href="https://www.amilifeassurance.com"
