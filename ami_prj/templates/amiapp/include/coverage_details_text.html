<li>Star World Playground သို့ လာရောက်ကစားသူများအတွက်စီစဉ်ထားသောတစ်ဦး ချင်းစီ အလိုက် အသက်အာမခံအကျိုးခံစားခွင့် ဖြစ်ပါသည်။ </li>
<li>Star World Playground အတွင်း လည်ပတ်နေစဉ် နှင့် ကစားနေစဉ် 	အတွင်း မတော် တဆ ဖြစ်ရပ်များ ဖြစ်ပွားခဲ့ပါက ငွေကြေးဆိုင်ရာ ကာကွယ်မှု တစ်ခု ပြီး အာမခံသက်တမ်းမှာ (၁) ရက် ဖြစ်ပါသည်။</li>
